<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ─── PWA ─── -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#F5A623" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Porokhane" />

    <!-- ─── ICÔNE APPLE (iPhone) ─── -->
    <link rel="apple-touch-icon" href="https://fedznkkxobzgzsbybozb.supabase.co/storage/v1/object/public/product-images/Porokhane%20SHOP.png" />

    <!-- ─── SEO ─── -->
    <title>Porokhane Shop ✨ - Voiles & Accessoires · Dakar</title>
    <meta name="description" content="Voiles et accessoires de qualité à Dakar. Pashmina, Cashmere, Jersey. Élégance, Pudeur et Classe en parfait symbiose !" />
    <meta name="keywords" content="voile, hijab, pashmina, cashmere, jersey, Dakar, Sénégal" />

    <!-- ─── OG (partage réseaux sociaux) ─── -->
    <meta property="og:title" content="Porokhane Shop ✨" />
    <meta property="og:description" content="Élégance, Pudeur et Classe en parfait symbiose !" />
    <meta property="og:image" content="https://fedznkkxobzgzsbybozb.supabase.co/storage/v1/object/public/product-images/Porokhane%20SHOP.png" />
    <meta property="og:type" content="website" />

    <!-- ─── SPLASH SCREEN iOS ─── -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <style>
      /* Splash screen pendant le chargement */
      #splash {
        position: fixed; inset: 0;
        background: #1A1A1A;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 20px; z-index: 9999;
        transition: opacity .4s ease;
      }
      #splash.hide { opacity: 0; pointer-events: none; }
      #splash img {
        width: 100px; height: 100px;
        border-radius: 50%;
        border: 3px solid #F5A623;
        box-shadow: 0 0 30px rgba(245,166,35,.4);
        animation: pop .5s ease;
      }
      #splash p {
        font-family: Georgia, serif;
        font-size: 16px; color: #F5A623;
        font-style: italic; letter-spacing: .5px;
      }
      #splash .loader {
        width: 40px; height: 3px;
        background: rgba(255,255,255,.1);
        border-radius: 2px; overflow: hidden;
      }
      #splash .loader-bar {
        height: 100%; width: 0%;
        background: #F5A623; border-radius: 2px;
        animation: load 1.2s ease forwards;
      }
      @keyframes pop {
        from { transform: scale(.8); opacity: 0; }
        to   { transform: scale(1);  opacity: 1; }
      }
      @keyframes load {
        to { width: 100%; }
      }
    </style>
  </head>
  <body>

    <!-- SPLASH SCREEN -->
    <div id="splash">
      <img
        src="https://fedznkkxobzgzsbybozb.supabase.co/storage/v1/object/public/product-images/Porokhane%20SHOP.png"
        alt="Porokhane Shop"
        onerror="this.style.display='none'"
      />
      <p>"Élégance, Pudeur et Classe"</p>
      <div class="loader"><div class="loader-bar"></div></div>
    </div>

    <!-- APP REACT -->
    <div id="root"></div>

    <script>
      // Cacher le splash quand React est chargé
      window.addEventListener('load', () => {
        setTimeout(() => {
          const splash = document.getElementById('splash')
          if (splash) {
            splash.classList.add('hide')
            setTimeout(() => splash.remove(), 400)
          }
        }, 1200)
      })

      // Enregistrer le Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(() => console.log('✅ SW enregistré'))
            .catch(err => console.log('SW erreur:', err))
        })
      }
    </script>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
